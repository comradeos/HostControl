# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

parameters:

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    App\Domain\Account\AccountRepositoryInterface:
        alias: App\Infrastructure\Persistence\Doctrine\AccountRepository

    App\Infrastructure\Http\ExceptionListener:
        tags:
            - { name: kernel.event_listener, event: kernel.exception }
